<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interests – Antonio IR</title>
  <style>
    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      line-height: 1.6;
    }

    /* ── Page wrapper (matches other pages) ─────────────────── */
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      border-radius: 6px;
    }

    /* ── Section title ───────────────────────────────────────── */
    .section-title {
      font-size: 2rem;
      font-weight: bold;
      color: #222;
      margin-bottom: 16px;
    }

    /* ── Interests list ──────────────────────────────────────── */
    .interests-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0;
      font-size: 0.95rem;
      color: #333;
    }

    .interests-list li {
      display: flex;
      align-items: center;
    }

    .interests-list li + li::before {
      content: "|";
      margin: 0 8px;
      color: #555;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .container {
        margin: 20px;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <h1 class="section-title">Interests</h1>

    <ul class="interests-list" aria-label="Personal and professional interests">
      <li>Physics</li>
      <li>Sustainability</li>
      <li>Philanthropy</li>
      <li>Extraterrestrial life</li>
      <li>Alternative energy sources</li>
      <li>Space engineering</li>
      <li>Reading</li>
      <li>Video games</li>
    </ul>

  </div>
</body>
</html>
