<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Languages – Antonio IR</title>
  <style>
    /* ── Reset ───────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      line-height: 1.6;
    }

    /* ── Page wrapper (matches other pages) ─────────────────── */
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      border-radius: 6px;
    }

    /* ── Section title ───────────────────────────────────────── */
    .section-title {
      font-size: 2rem;
      font-weight: bold;
      color: #222;
      margin-bottom: 24px;
    }

    /* ── Languages grid ──────────────────────────────────────── */
    .languages-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px 40px;
    }

    /* ── Language card ───────────────────────────────────────── */
    .language-card__name {
      font-size: 0.95rem;
      color: #333;
      margin-bottom: 6px;
    }

    .language-card__level {
      font-size: 0.85rem;
      color: #777;
      margin-bottom: 8px;
    }

    /* ── Proficiency bar ─────────────────────────────────────── */
    .language-card__bar {
      height: 6px;
      background-color: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
    }

    .language-card__bar-fill {
      height: 100%;
      background-color: #e84040;
      border-radius: 3px;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .container {
        margin: 20px;
        padding: 24px;
      }

      .languages-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <h1 class="section-title">Languages</h1>

    <div class="languages-grid" aria-label="Languages and proficiency levels">

      <!-- English -->
      <div class="language-card">
        <p class="language-card__name">English</p>
        <p class="language-card__level">Native / Bilingual</p>
        <div class="language-card__bar" aria-label="English: Native / Bilingual">
          <div class="language-card__bar-fill" style="width: 100%;"></div>
        </div>
      </div>

      <!-- Afrikaans -->
      <div class="language-card">
        <p class="language-card__name">Afrikaans</p>
        <p class="language-card__level">Professional Working</p>
        <div class="language-card__bar" aria-label="Afrikaans: professional working">
          <div class="language-card__bar-fill" style="width: 60%;"></div>
        </div>
      </div>

      <!-- Spanish -->
      <div class="language-card">
        <p class="language-card__name">Spanish</p>
        <p class="language-card__level">Elementary</p>
        <div class="language-card__bar" aria-label="Spanish: elementary">
          <div class="language-card__bar-fill" style="width: 25%;"></div>
        </div>
      </div>

    </div>

  </div>
</body>
</html>
